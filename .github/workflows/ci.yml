name: SENSO+ CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sensoplus
          POSTGRES_PASSWORD: sensoplus
          POSTGRES_DB: sensoplus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sensoplus_test
      DB_USER: sensoplus
      DB_PASSWORD: sensoplus
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Run tests
        run: npm test

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sensoplus-backend:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run -d --name test-container \
            -e NODE_ENV=production \
            -e DATABASE_URL=postgresql://fake \
            -e JWT_SECRET=testsecret \
            -e JWT_REFRESH_SECRET=testrefreshsecret \
            -e PORT=3000 \
            -p 3000:3000 \
            sensoplus-backend:${{ github.sha }} || true
          sleep 3
          docker rm -f test-container || true
